# ---------------------------------------------------------------------------
# hasura-secrets.yaml — InfisicalSecret CRD for Hasura GraphQL Engine
#
# Fetches the HASURA_GRAPHQL_ADMIN_SECRET from the Infisical project
# (hpa-workloads) and creates a standard Kubernetes Secret in the hasura
# namespace. Hasura's Helm chart reads the admin secret from environment
# variables set at deploy time.
#
# Prerequisites:
#   - Infisical instance running (install-infisical.sh)
#   - Infisical Secrets Operator running
#   - bootstrap-infisical-workloads.sh has completed successfully
#   - K8s Secret 'infisical-auth' exists in the hasura namespace
#     (created by bootstrap-infisical-workloads.sh)
# ---------------------------------------------------------------------------
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: hasura-secrets
  namespace: hasura
  labels:
    app.kubernetes.io/name: hasura
    app.kubernetes.io/part-of: hpa-workloads
spec:
  # Host is the Infisical API URL (in-cluster Service DNS)
  hostAPI: "http://infisical.infisical.svc.cluster.local:8080"

  # Authenticate via Universal Auth using the machine identity credentials
  # created by bootstrap-infisical-workloads.sh
  auth:
    universalAuth:
      secretsPath: "/"
      secretsReference:
        secretName: infisical-auth
        secretNamespace: hasura

  # Target Kubernetes Secret that will be created/populated by the operator
  managedSecretReference:
    secretName: hasura-infisical-secrets
    secretNamespace: hasura
