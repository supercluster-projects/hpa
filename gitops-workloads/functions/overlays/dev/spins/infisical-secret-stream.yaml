# ---------------------------------------------------------------------------
# infisical-secret-stream.yaml — InfisicalSecret CRD for
# stream SpinApp
#
# Fetches secrets from the Infisical project (hpa-workloads) and creates a
# standard Kubernetes Secret in the hpa-workloads namespace. The
# stream SpinApp currently has KEYDB_URL hardcoded in its
# environment; this CRD ensures the secret exists for future migration to
# secret references or for verification purposes.
#
# Prerequisites:
#   - Infisical instance running (install-infisical.sh)
#   - Infisical Secrets Operator running
#   - bootstrap-infisical-workloads.sh has completed successfully
#   - K8s Secret 'infisical-auth' exists in the hpa-workloads namespace
# ---------------------------------------------------------------------------
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: stream-secrets
  namespace: hpa-workloads
  labels:
    app.kubernetes.io/name: stream
    app.kubernetes.io/part-of: hpa-workloads
spec:
  # Host is the Infisical API URL (in-cluster Service DNS)
  hostAPI: "http://infisical.infisical.svc.cluster.local:8080"

  # Authenticate via Universal Auth using the machine identity credentials
  # created by bootstrap-infisical-workloads.sh
  auth:
    universalAuth:
      secretsPath: "/"
      secretsReference:
        secretName: infisical-auth
        secretNamespace: hpa-workloads

  # Target Kubernetes Secret that will be created/populated by the operator
  managedSecretReference:
    secretName: stream-infisical-secrets
    secretNamespace: hpa-workloads
