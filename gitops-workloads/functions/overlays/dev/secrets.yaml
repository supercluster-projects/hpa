# ---------------------------------------------------------------------------
# secrets.yaml — InfisicalSecret CRD for welcome workload
#
# This manifest defines an InfisicalSecret managed by the Infisical Secrets
# Operator. It fetches secrets from the Infisical cluster (deployed by
# install-infisical.sh) and creates a standard Kubernetes Secret that the
# welcome Knative Service can consume via envFrom.
#
# Prerequisites:
#   - Infisical instance running (install-infisical.sh)
#   - Infisical Secrets Operator running
#   - A valid Infisical service token for the hpa-workloads project
#     created via the Infisical UI or API:
#       infisical login
#       infisical project create hpa-workloads
#       infisical secret create COUNTER_ADDR "http://counter.hpa-workloads.svc.cluster.local:8080"
#       infisical service-token create welcome-token --project hpa-workloads
#
# The service token must be stored as a Kubernetes Secret in the
# hpa-workloads namespace before this InfisicalSecret can resolve.
#
# See: https://infisical.com/docs/documentation/platform/secrets-operator
# ---------------------------------------------------------------------------
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: welcome-secrets
  namespace: hpa-workloads
  labels:
    app.kubernetes.io/name: welcome
    app.kubernetes.io/part-of: hpa-workloads
spec:
  # Host is the Infisical API URL (in-cluster Service DNS)
  hostAPI: "http://infisical.infisical.svc.cluster.local:8080"

  # Reference to the Kubernetes Secret containing the Infisical service token
  # This Secret must be created manually or via a bootstrap process:
  #   kubectl create secret generic infisical-token \
  #     --namespace hpa-workloads \
  #     --from-literal=infisical-token="<service-token>"
  auth:
    serviceTokenSecretReference:
      secretName: infisical-token
      secretNamespace: hpa-workloads

  # Target Kubernetes Secret that will be created/populated by the operator
  managedSecretReference:
    secretName: welcome-infisical-secrets
    secretNamespace: hpa-workloads
