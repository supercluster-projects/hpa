# ---------------------------------------------------------------------------
# infisical-secret.yaml — InfisicalSecret CRD for Casbin workload
#
# Fetches secrets from the Infisical project (hpa-workloads) and creates a
# standard Kubernetes Secret that the Casbin deployment consumes via envFrom.
# Uses Universal Auth with the machine identity credentials created by
# bootstrap-infisical-workloads.sh.
#
# Prerequisites:
#   - Infisical instance running (install-infisical.sh)
#   - Infisical Secrets Operator running
#   - bootstrap-infisical-workloads.sh has completed successfully
#   - K8s Secret 'infisical-auth' exists in the casbin namespace
# ---------------------------------------------------------------------------
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: casbin-secrets
  namespace: casbin
  labels:
    app.kubernetes.io/name: casbin
    app.kubernetes.io/part-of: hpa-workloads
spec:
  # Host is the Infisical API URL (in-cluster Service DNS)
  hostAPI: "http://infisical.infisical.svc.cluster.local:8080"

  # Authenticate via Universal Auth using the machine identity credentials
  # created by bootstrap-infisical-workloads.sh
  auth:
    universalAuth:
      secretsPath: "/"
      secretsReference:
        secretName: infisical-auth
        secretNamespace: casbin

  # Target Kubernetes Secret that will be created/populated by the operator
  managedSecretReference:
    secretName: casbin-infisical-secrets
    secretNamespace: casbin
