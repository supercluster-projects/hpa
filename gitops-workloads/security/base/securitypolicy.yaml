apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: hpa-dev-security-policy
  namespace: envoy-gateway-system
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: hpa-dev-gateway
  extAuth:
    grpc:
      backendRefs:
        - name: casbin-ext-authz
          namespace: casbin
          port: 9001
    headersToExtAuth:
      - Authorization
    headersToBackend:
      - Authorization
      - X-User
      - X-Role
      - X-Sub
    timeout: 10s
    failOpen: false
