#:schema https://schemas.spinframework.dev/spin/manifest-v2/latest.json

spin_manifest_version = 2

[application]
name = "stream-processor"
version = "0.1.0"
authors = ["Vladimir Cores <vladimir.cores@gmail.com>"]
description = "Streams HPA events from Kafka, aggregates device_type metrics into KeyDB"

[[trigger.kafka]]
topic = "hpa-events"
consumer-group = "hpa-stream-processor"
component = "stream-processor"

[component.stream-processor]
source = "target/wasm32-wasip1/release/stream-processor.wasm"
allowed_outbound_hosts = ["redis://keydb.keydb.svc.cluster.local:6379", "all"]
environment = { KEYDB_URL = "redis://keydb.keydb.svc.cluster.local:6379/" }

[component.stream-processor.build]
command = "cargo build --target wasm32-wasip1 --release"
watch = ["src/**/*.rs", "Cargo.toml"]
